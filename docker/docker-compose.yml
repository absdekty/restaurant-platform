services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d users_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  auth:
    build:
      context: ..
      dockerfile: docker/auth/Dockerfile
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../configs:/configs:ro
      - ../certs:/certs:ro

  user:
    build:
      context: ..
      dockerfile: docker/user/Dockerfile
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../configs:/configs:ro
      - ../certs:/certs:ro

  gateway:
    build:
      context: ..
      dockerfile: docker/gateway/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      - auth
      - user
      - redis
    volumes:
      - ../configs:/configs:ro
      - ../certs:/certs:ro

volumes:
  pgdata:
  redisdata: